<!DOCTYPE html>
<html>
<head>
    <title>Weather App</title>

    <!-- MOBILE SUPPORT -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Chart -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin: 0;
            padding: 20px;
            background: linear-gradient(to right, #74ebd5, #ACB6E5);
        }

        .box {
            width: 90%;
            max-width: 420px;
            margin: auto;
            background: rgba(255,255,255,0.2);
            padding: 20px;
            border-radius: 15px;
        }

        form {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        input {
            padding: 10px;
            width: 90%;
            margin: 5px;
            border-radius: 8px;
            border: none;
        }

        button {
            padding: 12px;
            margin: 5px;
            width: 90%;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }

        .forecast {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 15px;
        }

        .card {
            background: white;
            padding: 10px;
            margin: 5px;
            border-radius: 10px;
            width: 80px;
        }

        canvas {
            margin-top: 20px;
        }

        .error {
            color: red;
        }

        /* MOBILE OPTIMIZATION */
        @media (max-width: 600px) {

            h2 {
                font-size: 20px;
            }

            input, button {
                font-size: 14px;
                padding: 10px;
            }

            .forecast {
                flex-direction: column;
                align-items: center;
            }

            .card {
                width: 80%;
            }

            canvas {
                width: 100% !important;
                height: auto !important;
            }
        }
    </style>
</head>

<body>

<div class="box">
    <h2>🌦 Weather App</h2>

    <form method="POST">
        <input type="text" name="city" placeholder="Enter city" required>
        <button type="submit">Search</button>
    </form>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    {% if weather %}
        <h3>{{ weather.city }}</h3>
        <p>🌡 Temp: {{ weather.temp }} °C</p>
        <p>💧 Humidity: {{ weather.humidity }}%</p>
        <p>☁ {{ weather.desc }}</p>

        <h4>Forecast</h4>

        <div class="forecast">
            {% for item in forecast %}
                <div class="card">
                    <p>{{ item.time.split()[1] }}</p>
                    <p>{{ item.temp }}°C</p>
                </div>
            {% endfor %}
        </div>

        <canvas id="chart"></canvas>

        <script>
            new Chart(document.getElementById("chart"), {
                type: "line",
                data: {
                    labels: {{ labels | safe }},
                    datasets: [{
                        label: "Temp °C",
                        data: {{ temps | safe }}
                    }]
                }
            });
        </script>
    {% endif %}
</div>

</body>
</html>
